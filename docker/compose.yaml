services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cla_admin
      POSTGRES_USER: cla_admin
      POSTGRES_PASSWORD: cla_admin
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U cla_admin -d cla_admin
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: