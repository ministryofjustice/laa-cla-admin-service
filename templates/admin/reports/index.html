{% extends "admin/base_site.html" %}

{% block content_title %}<h1>Reports</h1>{% endblock %}

{% block content %}
<div id="content-main">
  <table>
    <thead>
      <tr>
        <th>Report</th>
        <th>Description</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for report in reports %}
      <tr>
        <td>{{ report.name }}</td>
        <td>{{ report.description }}</td>
        <td><a href="{% url report.url %}">View</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
