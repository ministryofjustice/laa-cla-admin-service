# Default values for laa-cla-admin-service in the uat environment.
environment: "uat"

ingress:
  enabled: true
  host: "laa-cla-admin-service-uat.cloud-platform.service.justice.gov.uk"
  tls:
    secretName: "tls-certificate"

whitelist:
  enabled: true

# Lists don't deep merge, so this map overrides anything defined in an earlier values file
envVars:
  DEBUG:
    value: "True"
  DJANGO_SETTINGS_MODULE:
    value: "config.settings.uat"
  SECRET_KEY:
    # TEMPORARY: Non-production secret for UAT testing only
    # TODO: Once UAT has a real DB, switch and use a K8s secret
    value: "django-insecure-uat-4x7!p2k9mq@z#r8vn$j5wl1&hs6yte3oc0"
  # TEMPORARY: Admin credentials auto-created in SQLite for testing
  # TODO: Remove these and use proper identity management once production DB is ready
  ADMIN_USER:
    value: "cla_admin"
  ADMIN_PASSWORD:
    value: "cla_admin_uat_temp"
  ADMIN_EMAIL:
    value: "cla_admin@uat.local"
