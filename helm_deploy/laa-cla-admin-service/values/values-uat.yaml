# Default values for laa-cla-admin-service in the uat environment.
environment: "uat"

ingress:
  enabled: true
  host: "laa-cla-admin-service-uat.cloud-platform.service.justice.gov.uk"
  tls:
    secretName: "tls-certificate"

whitelist:
  enabled: true

# Lists don't deep merge, so this map overrides anything defined in an earlier values file
envVars:
  DEBUG:
    value: "False"
  DJANGO_SETTINGS_MODULE:
    value: "config.settings.uat"
  SECRET_KEY:
    # TEMPORARY: Non-production secret for UAT testing only
    # TODO: Once UAT has a real DB, switch and use a K8s secret
    value: "django-insecure-uat-4x7!p2k9mq@z#r8vn$j5wl1&hs6yte3oc0"
  # UAT admin credentials are sourced from a Kubernetes Secret.
  # This repository is public, so credentials must not be committed in plaintext.
  ADMIN_USER:
    secret:
      name: laa-cla-admin-service-uat-admin
      key: username
  ADMIN_PASSWORD:
    secret:
      name: laa-cla-admin-service-uat-admin
      key: password
  ADMIN_EMAIL:
    secret:
      name: laa-cla-admin-service-uat-admin
      key: email
      optional: true
  # Do not reset password on every deploy; set to true only for an explicit rotation.
  ADMIN_RESET_PASSWORD:
    value: "false"
