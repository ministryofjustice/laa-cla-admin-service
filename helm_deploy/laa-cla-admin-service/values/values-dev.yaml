# Default values for laa-cla-admin-service in the dev environment.
# The laa-cla-admin-service-dev namespace installs a new helm release per feature branch
# this is then uninstalled when the branch is merged.
environment: "dev"

ingress:
  enabled: true
  host: "laa-cla-admin-service-dev.cloud-platform.service.justice.gov.uk"

whitelist:
  enabled: true

envVars:
  DEBUG:
    value: "True"