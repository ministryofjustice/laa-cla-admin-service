name: Build and Push image

on:
  workflow_call:
    inputs:
      CLA_ADMIN_SERVICE_ECR_REGION:
        required: true
        type: string
      CLA_ADMIN_SERVICE_ECR_REPOSITORY:
        required: true
        type: string
    secrets:
      CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME:
        required: true

jobs:
  build-and-push-to-ecr:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.CLA_ADMIN_SERVICE_ECR_REGION }}

      - name: Login to container repository
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.CLA_ADMIN_SERVICE_ECR_REPOSITORY }}
          tags: |
            type=sha,format=long,prefix=,suffix=

      - name: Build and push a Docker image to the container repository
        id: docker-build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
