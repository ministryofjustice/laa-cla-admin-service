name: Build and Push image

on:
  workflow_call:
    inputs:
      CLA_ADMIN_SERVICE_ECR_REGION:
        required: true
        type: string
      CLA_ADMIN_SERVICE_ECR_REPOSITORY:
        required: true
        type: string
    secrets:
      CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME:
        required: true

jobs:
  build-and-push-to-ecr:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.CLA_ADMIN_SERVICE_ECR_REGION }}

      - name: Login to container repository
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.CLA_ADMIN_SERVICE_ECR_REPOSITORY }}
          tags: |
            type=sha,format=long,prefix=,suffix=

      - name: Build and push a Docker image to the container repository
        id: docker-build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
