name: Test, Build and Push image

on:
  workflow_call:
    inputs:
      CLA_ADMIN_SERVICE_ECR_REGION:
        required: true
        type: string
      CLA_ADMIN_SERVICE_ECR_REPOSITORY:
        required: true
        type: string
    secrets:
      CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME:
        required: true

jobs:
  lint:
    name: Lint and format checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[development]"

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: cla_admin
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cla_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run unit tests
        uses: ./.github/actions/run-unit-tests
        with:
          DB_HOST: localhost
          DB_NAME: cla_admin
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

  build-and-push-to-ecr:
    name: Build and Push
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Assume role in Cloud Platform
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.CLA_ADMIN_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.CLA_ADMIN_SERVICE_ECR_REGION }}

      - name: Login to container repository
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        id: login-ecr
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.CLA_ADMIN_SERVICE_ECR_REPOSITORY }}
          tags: |
            type=sha,format=long,prefix=,suffix=

      - name: Build and push a Docker image to the container repository
        id: docker-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
