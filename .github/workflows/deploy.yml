name: Deploy to a Cloud Platform environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      CLA_ADMIN_SERVICE_ECR_REPOSITORY:
        required: true
        type: string
      DEPLOYMENT_URL:
        required: false
        type: string
    secrets:
      ECR_REGISTRY_URL:
        required: true
      KUBE_CERT:
        required: true
      KUBE_CLUSTER:
        required: true
      KUBE_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.DEPLOYMENT_URL }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Authenticate to the cluster
        env:
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
          KUBE_NAMESPACE: ${{ github.event.repository.name }}-${{ inputs.environment }}
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: Fetch and set whitelist IP environment variables
        run: |
          SHARED_IP_RANGES_LAA=$(curl -s https://raw.githubusercontent.com/ministryofjustice/laa-ip-allowlist/main/cidrs.txt | tr -d ' ' | tr '\n' ',' | sed 's/,/\\,/g' | sed 's/\\,$//')
          PINGDOM_IPS=$(curl -s https://my.pingdom.com/probes/ipv4 | tr -d ' ' | tr '\n' ',' | sed 's/,/\\,/g' | sed 's/\\,$//')
          echo "PINGDOM_IPS=$PINGDOM_IPS" >> $GITHUB_ENV
          echo "SHARED_IP_RANGES_LAA=$SHARED_IP_RANGES_LAA" >> $GITHUB_ENV

      - name: Upgrade the Helm chart
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
          REPOSITORY: ${{ inputs.CLA_ADMIN_SERVICE_ECR_REPOSITORY }}
          HELM_DIR: helm_deploy/laa-cla-admin-service
          SHARED_IP_RANGES_LAA: ${{ env.SHARED_IP_RANGES_LAA }}
          KUBE_NAMESPACE: ${{ github.event.repository.name }}-${{ inputs.environment }}
        run: |
          helm upgrade laa-cla-admin-service \
          ${HELM_DIR} \
          --namespace=${KUBE_NAMESPACE} \
          --values ${HELM_DIR}/values/values-${{ inputs.environment }}.yaml \
          --set image.repository=${ECR_REGISTRY_URL}/${REPOSITORY} \
          --set image.tag=${IMAGE_TAG} \
          --set sharedIPRangesLAA=$SHARED_IP_RANGES_LAA \
          --set pingdomIPs=$PINGDOM_IPS \
          --force \
          --install
